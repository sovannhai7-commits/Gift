<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Birthday Kiss For You! 💋</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #fff0f3, #ffccd5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* --- Step 1: The Kiss Target Container --- */
        #kiss-container {
            text-align: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.5s ease;
        }

        .kiss-instruction {
            color: #ff4d6d;
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            animation: pulseText 1.5s infinite alternate;
        }

        .kiss-btn {
            font-size: 90px;
            background: white;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.3);
            margin: 0 auto;
            user-select: none;
            animation: floatBtn 3s ease-in-out infinite;
            transition: transform 0.2s;
        }

        .kiss-btn:active {
            transform: scale(0.9);
        }

        /* --- Step 2: Surprise Birthday Card (Hidden initially) --- */
        #surprise-card {
            display: none;
            text-align: center;
            opacity: 0;
            transform: scale(0.8) translateY(50px);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
            width: 480px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 20px 50px rgba(255, 75, 110, 0.15);
            border: 2px solid #ffb3c1;
            z-index: 5;
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.6rem;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .love-note {
            color: #ff758f;
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: 500;
            line-height: 1.5;
        }

        /* --- Big Real Showcase Panel for iPhone 17 Pro Max --- */
        .iphone-showcase {
            background: linear-gradient(145deg, #ffffff, #f0f0f5);
            border: 3px solid #ff4d6d;
            border-radius: 28px;
            padding: 25px 15px;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.02), 0 15px 35px rgba(255, 77, 109, 0.12);
            margin-bottom: 20px;
        }

        .ribbon {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4d6d;
            color: white;
            padding: 4px 18px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }

        .device-title {
            font-size: 1.8rem;
            color: #2d2d3a;
            font-weight: 800;
            margin-top: 10px;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .device-sub {
            font-size: 0.95rem;
            color: #a0a0ab;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Simulated Realistic Mockup Graphic */
        .phone-mockup {
            width: 140px;
            height: 280px;
            background: #000000;
            border: 4px solid #c5c5ca; /* Titanium Finish color */
            border-radius: 24px;
            margin: 0 auto 15px auto;
            position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* Dynamic Island */
        .dynamic-island {
            width: 50px;
            height: 13px;
            background: #000000;
            border-radius: 10px;
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
        }

        /* Screen Wallpaper Gradient */
        .phone-screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #6b21a8, #c084fc, #ff85a2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 10px;
        }

        .screen-logo {
            font-size: 32px;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .screen-text {
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        /* --- Floating Particles --- */
        .floating-heart {
            position: absolute;
            pointer-events: none;
            bottom: -50px;
            animation: floatUp 4s linear infinite;
        }

        /* --- Keyframe Animations --- */
        @keyframes pulseText {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; color: #ff124f; }
        }

        @keyframes floatBtn {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh) translateX(var(--random-x)) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Web Audio API context helper for a cute pop sound effect -->
    <script>
        function playPopSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch(e) { }
        }
    </script>

    <!-- STEP 1: Give a Kiss Interface -->
    <div id="kiss-container" onclick="triggerWishAndKiss()">
        <div class="kiss-instruction">Press & Kiss here for your surprise! 💋</div>
        <div class="kiss-btn">💋</div>
    </div>

    <!-- STEP 2: The Big Wish & Big Gift Display Card -->
    <div id="surprise-card">
        <h1>Happy Birthday, My Lovely Wife! 🎉</h1>
        <p class="love-note">“Thank you for loving me the way you do. You deserve the entire world, but let’s start with a beautiful gift just for you!” ❤️</p>
        
        <!-- Big Gift Showcase -->
        <div class="iphone-showcase">
            <div class="ribbon">Your Gift</div>
            <div class="device-title">iPhone 17 Pro Max</div>
            <div class="device-sub">Desert Titanium • 1TB</div>
            
            <!-- Structural Phone Mockup -->
            <div class="phone-mockup">
                <div class="dynamic-island"></div>
                <div class="phone-screen">
                    <div class="screen-logo"></div>
                    <div class="screen-text">Happy Birthday</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function triggerWishAndKiss() {
            playPopSound();

            const kissContainer = document.getElementById('kiss-container');
            const surpriseCard = document.getElementById('surprise-card');

            // Animate transition out
            kissContainer.style.opacity = '0';
            kissContainer.style.transform = 'scale(0.5)';
            
            setTimeout(() => {
                kissContainer.style.display = 'none';
                
                // Animate transition in
                surpriseCard.style.display = 'block';
                setTimeout(() => {
                    surpriseCard.style.opacity = '1';
                    surpriseCard.style.transform = 'scale(1) translateY(0)';
                }, 50);
            }, 400);

            // Spawn waves of romantic floating hearts
            setInterval(createFloatingHeart, 250);
        }

        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            
            const icons = ['❤️', '💖', '💋', '💝', '💕', '💗'];
            heart.innerText = icons[Math.floor(Math.random() * icons.length)];

            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 20 + 'px';
            
            const duration = Math.random() * 2.5 + 2.5; 
            heart.style.animationDuration = duration + 's';

            const drift = (Math.random() * 300 - 150) + 'px';
            heart.style.setProperty('--random-x', drift);

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }
    </script>
</body>
</html>
